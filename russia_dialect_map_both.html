br&gt; &lt;b&gt;Регион фиксации:&lt;/b&gt; Олонецкая губерния&lt;br&gt; &lt;b&gt;Год фиксации:&lt;/b&gt; 1842—1848 гг.&lt;br&gt; &lt;b&gt;НКРЯ:&lt;/b&gt; 1. Устропься! Устропься, бажаный! Обшушился вялко, коршу догребавши: [Дмитрий Быков. Орфография (2002)] 2. Жёнка его Степанида схитрилась: ствол восьмигранный сымет да дедке на плечо ложу одну и повесит, вот тебе забава, шагай баженый. [Владимир Личутин. Крылатая Серафима (1977)]&lt;br&gt;     &lt;/div&gt;     &lt;/div&gt;`)[0];

». Верхот. Перм., Богоявленский, 1899. &lt;br&gt; &lt;b&gt;Регион фиксации:&lt;/b&gt; Архангельская губерния (область)&lt;br&gt; &lt;b&gt;Год фиксации:&lt;/b&gt; 1842—1848 гг.&lt;br&gt; &lt;b&gt;НКРЯ:&lt;/b&gt; 1. Устропься! Устропься, бажаный! Обшушился вялко, коршу догребавши: [Дмитрий Быков. Орфография (2002)] 2. Жёнка его Степанида схитрилась: ствол восьмигранный сымет да дедке на плечо ложу одну и повесит, вот тебе забава, шагай баженый. [Владимир Личутин. Крылатая Серафима (1977)]&lt;br&gt;     &lt;/div&gt;     &lt;/div&gt;`)[0];

меров в НКРЯ:  1. Я не архирей… Ой, жаланный! — поднимаясь, запричитали хозяева. Кланяться-то мы горазды, а вот молвить не умеем. [В. Я. Шишков. Емельян Пугачев. Книга третья. Ч. 2 (1934-1945)] 2. Сердцу тошно… Гришенька, внучек ты мой жаланный… Помолись на церковь-то, касатик. [Артем Веселый. Россия, кровью умытая (1924-1932)] 3. В каждой руке он держал по бутылке — целовал их, прижимал к груди и вопил:  Вот когда я тебя достал, жаланная… Вот оно коко с соком…  [Артем Веселый. Россия, кровью умытая (1924-1932)] 4. Шмурыгин усмехнулся. Чаво изволишь, жаланный?  Шмурыгин почесал в затылке. [Б. А. Садовской. Невольник чести (1927)] 5. Он взял мою руку и потянул поцеловать. Здравствуй, миленый, жаланный сыночек… И скажи, кормилец, когда это кончится? [К. И. Чуковский. Дневник (1921)] 6. Я, жаланный, помню крепостное право, мне лет тридцать было, как помещики рушились, а такого не помню…[К. И. Чуковский. Дневник (1921)]&lt;br&gt;     &lt;/div&gt;     &lt;/div&gt;`)[0];

в в НКРЯ:  1. Я не архирей… Ой, жаланный! — поднимаясь, запричитали хозяева. Кланяться-то мы горазды, а вот молвить не умеем. [В. Я. Шишков. Емельян Пугачев. Книга третья. Ч. 2 (1934-1945)] 2. Сердцу тошно… Гришенька, внучек ты мой жаланный… Помолись на церковь-то, касатик. [Артем Веселый. Россия, кровью умытая (1924-1932)] 3. В каждой руке он держал по бутылке — целовал их, прижимал к груди и вопил:  Вот когда я тебя достал, жаланная… Вот оно коко с соком…  [Артем Веселый. Россия, кровью умытая (1924-1932)] 4. Шмурыгин усмехнулся. Чаво изволишь, жаланный?  Шмурыгин почесал в затылке. [Б. А. Садовской. Невольник чести (1927)] 5. Он взял мою руку и потянул поцеловать. Здравствуй, миленый, жаланный сыночек… И скажи, кормилец, когда это кончится? [К. И. Чуковский. Дневник (1921)] 6. Я, жаланный, помню крепостное право, мне лет тридцать было, как помещики рушились, а такого не помню…[К. И. Чуковский. Дневник (1921)]&lt;br&gt;     &lt;/div&gt;     &lt;/div&gt;`)[0];

имеров в НКРЯ:  1. Я не архирей… Ой, жаланный! — поднимаясь, запричитали хозяева. Кланяться-то мы горазды, а вот молвить не умеем. [В. Я. Шишков. Емельян Пугачев. Книга третья. Ч. 2 (1934-1945)] 2. Сердцу тошно… Гришенька, внучек ты мой жаланный… Помолись на церковь-то, касатик. [Артем Веселый. Россия, кровью умытая (1924-1932)] 3. В каждой руке он держал по бутылке — целовал их, прижимал к груди и вопил:  Вот когда я тебя достал, жаланная… Вот оно коко с соком…  [Артем Веселый. Россия, кровью умытая (1924-1932)] 4. Шмурыгин усмехнулся. Чаво изволишь, жаланный?  Шмурыгин почесал в затылке. [Б. А. Садовской. Невольник чести (1927)] 5. Он взял мою руку и потянул поцеловать. Здравствуй, миленый, жаланный сыночек… И скажи, кормилец, когда это кончится? [К. И. Чуковский. Дневник (1921)] 6. Я, жаланный, помню крепостное право, мне лет тридцать было, как помещики рушились, а такого не помню…[К. И. Чуковский. Дневник (1921)]&lt;br&gt;     &lt;/div&gt;     &lt;/div&gt;`)[0];

                var html_bc430d1dc4eac64c21ea445c48dbfd48 = $(`&lt;div id=&quot;html_bc430d1dc4eac64c21ea445c48dbfd48&quot; style=&quot;width: 100.0%; height: 100.0%;&quot;&gt;     &lt;div style=&quot;max-width:380px; max-height:420px; overflow-y:auto; font-size:13px; line-height:1.4;&quot;&gt;         &lt;h4 style=&quot;margin:0 0 10px 0;&quot;&gt;Калужская область, Мещовск — Жа́лкий и жалко́й&lt;/h4&gt;         &lt;b&gt;Источник:&lt;/b&gt; СРНГ&lt;br&gt; &lt;b&gt;Формы:&lt;/b&gt; Жа́лкий, ая, ое и жалко́й, а́я, о́е; ср. ст. жальче́е, жальче́й.&lt;br&gt; &lt;b&gt;Значение:&lt;/b&gt; 2. Дорогой, милый&lt;br&gt; &lt;b&gt;Все значения:&lt;/b&gt; 1. Жа́лкий. Сочувствующий, соболезнующий страданию, горю; жалостливый.  2. Дорогой, милый. 3. Скупой&lt;br&gt; &lt;b&gt;Пример из словаря:&lt;/b&gt; Дети жалкие, послушайте, я расскажу. Брян.  Заходи ты ко мне, жалкая моя! Няж мы тебе не родни, не жалки? Кто табе жальчёй, ти жонка ай матка? Смол. Курск., Дон.  И говорит ему родима да жалка матушка: Уж ты ой eси, дитятко, у мня малёхонько. Арх.,-.  Прощай, жалкий, прощай, милый, золотой. Дон.&lt;br&gt; &lt;b&gt;Регион фиксации:&lt;/b&gt; Мещовский уезд Калужской губернии&lt;br&gt; &lt;b&gt;НКРЯ:&lt;/b&gt; В НКРЯ нет ни одного примера со словоформой «жалкой». Есть 17557 примеров со словоформой «жалкий». Примеры со значением «милый, дорогой»: Чадушка моя! Жалкий мой, молочка-то кисленького положить? Да ты иди, садись, щи охолонуть. [М. А. Шолохов. Тихий Дон. Книга третья (1928-1940)] Она гладила его лицо над собой, гладила его затылок, плечи, все сильней прижимала к себе: Жалкий мой… И целовала его глаза, чтоб не смотрел. [Г. Я. Бакланов. Нездешний // «Знамя», 2001] Жалкая моя», — звала она ее, и, когда Бухара уходила на работу, Паша подолгу что-то рассказывала своей питомице. [Людмила Улицкая. Дочь Бухары (1992)] &lt;br&gt;     &lt;/div&gt;     &lt;/div&gt;`)[0];

                var html_7edda6b6cef605106da12108afb8584b = $(`&lt;div id=&quot;html_7edda6b6cef605106da12108afb8584b&quot; style=&quot;width: 100.0%; height: 100.0%;&quot;&gt;     &lt;div style=&quot;max-width:380px; max-height:420px; overflow-y:auto; font-size:13px; line-height:1.4;&quot;&gt;         &lt;h4 style=&quot;margin:0 0 10px 0;&quot;&gt;Владимирская область — Пи́саный&lt;/h4&gt;         &lt;b&gt;Источник:&lt;/b&gt; СРНГ&lt;br&gt; &lt;b&gt;Формы:&lt;/b&gt; Пи́саный, ая, ое&lt;br&gt; &lt;b&gt;Варианты ударения, произношения, грамматических форм:&lt;/b&gt; Пи́саный, м., пи́саная , ж., в знач. сущ. Шуйск. Влад., Гарелин&lt;br&gt; &lt;b&gt;Значение:&lt;/b&gt; 4. Милый, любимый, дорогой&lt;br&gt; &lt;b&gt;Все значения:&lt;/b&gt; 1. В сочетаниях (писаная коса, писаные валенки, писаные лапти, писаные рукавицы) 2. С краями, защипанными в виде зубчиков (о пирогах, пельменях и т. п.) 3. Пи́саный, м., в знач. сущ. Голубь определенной масти (белый голубь с черной головой или разноцветными перьями).  4. Милый, любимый, дорогой&lt;br&gt; &lt;b&gt;Пример из словаря:&lt;/b&gt; Ах ты, моя писаная! Звениг. Моск.&lt;br&gt; &lt;b&gt;Устойчивые сочетания:&lt;/b&gt; 1. (Мое) пи́саное дитятко. Ласковое обращение к ребенку. Влад., Даль. 2. Пи́саная моя. Ласковое обращение к женщине, девушке. Пошех.-Волод. Яросл., 1929.  &lt;br&gt; &lt;b&gt;Регион фиксации:&lt;/b&gt; Владимирская губерния (область)&lt;br&gt; &lt;b&gt;НКРЯ:&lt;/b&gt; Всего 1299 примеров в НКРЯ. Примеры со значением «милый, дорогой»: отсутствуют. Есть примеры со значением «написанный» и «красивый»: Прошло мало ли, много ли времени: скоро сказка сказывается, не скоро дело делается, — захотелось молодой дочери купецкой, красавице писаной, увидеть своими глазами зверя лесного, чуда морского, и стала она его о том просить и молить; долго он на то не соглашается, испугать ее опасается, да и был он такое страшилище, что ни в сказке сказать, ни пером написать; не токмо люди, звери дикие его завсегда устрашалися и в свои б
